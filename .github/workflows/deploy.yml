name: Deploy ECO Walls (via Docker Hub)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/eco-walls:latest
            ${{ secrets.DOCKER_USERNAME }}/eco-walls:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Initialize repository in-place if .git is missing (safely handles existing .env)
            if [ ! -d "/root/eco-walls/.git" ]; then
              git init /root/eco-walls
              cd /root/eco-walls
              git remote add origin https://github.com/BinaryBard7279/eco-walls.git
              git fetch
              git checkout -f main
            else
              cd /root/eco-walls
              git reset --hard HEAD
              git pull origin main
            fi
            
            # Pull the new image from Docker Hub and restart
            docker compose pull
            docker compose up -d
