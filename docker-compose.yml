services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - media_data:/code/app/uploads
    networks:
      - itnet

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend:/usr/share/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - itnet

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - itnet

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  media_data:

networks:
  itnet:
    driver: bridge
